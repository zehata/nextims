apiVersion: v1
kind: Service
metadata:
  name: translational-informatics-access-management
spec:
  ports:
  - port: 3000
    name: http
  type: LoadBalancer
  selector:
    app: translational-informatics-access-management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translational-informatics-access-management
spec:
  selector:
    matchLabels:
      app: translational-informatics-access-management
  template:
    metadata:
      labels:
        app: translational-informatics-access-management
    spec:
      containers:
      - name: translational-informatics-access-management
        image: translational-informatics-access-management
        ports:
          - containerPort: 3000