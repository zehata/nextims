services:
  key-operations-portal-interface:
    build: key-operations-portal-interface
    ports:
      - "3000:3000"
    tty: true

  translational-informatics-access-management:
    build: translational-informatics-access-management
    ports:
      - "8080:3000"
    tty: true
    secrets:
      - db_password

  translational-informatics-access-management-db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: /run/secret/db_password
    volumes:
      - ./data/translational-informatics-access-management-db:/var/lib/postgresql/
    tty: true
    secrets:
      - db_password

  postgres:
    image: postgres
    build: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: /run/secret/db_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/
    tty: true
    secrets:
      - db_password

  s3:
    image: localstack/localstack:s3-latest
    ports:
      - "4566:4566"
    volumes:
      - ./localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

secrets:
  db_password:
    file: db_password.txt